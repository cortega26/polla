name: tests

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff (fix)
        run: ruff check --fix .
      - name: Black (format)
        run: black --line-length=100 .
      - name: Auto-commit fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix linting and formatting"
          file_pattern: "*.py"
      - name: Mypy
        run: mypy polla_app tests
      - name: Pytest
        run: pytest -q
